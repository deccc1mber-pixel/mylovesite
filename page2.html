<!DOCTYPE html>
<html>
<head>
    <title>Страница 2</title>
    <style>
        body {
            height: 100vh; /* занять весь экран */
            display: flex;
            justify-content: center; /* горизонтальный центр */
            align-items: center;     /* вертикальный центр */
            background-color: #fff0f5; /* лёгкий фон */
            margin: 0; /* убираем отступы браузера */
        }

        img {
            max-width: 80%;   /* чтобы не было слишком большого */
            max-height: 80%;  /* чтобы не вылезало за экран */
            border-radius: 10px; /* немного скруглим углы */
            box-shadow: 0 0 20px rgba(0,0,0,0.2); /* лёгкая тень */
        }
    </style>
</head>
<body>

    <img src="img/c603f2f03bd7600d7a7e9df36eb4438c.jpg" alt="Моё фото">

</body>
</html>
